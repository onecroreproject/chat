{% extends 'base.html' %}
{% block title %}Forgot Password - TeamSync{% endblock %}
{% block body %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <h1>🔷 TeamSync</h1>
            <p>Reset your password</p>
        </div>
        {% for message in messages %}
        <div class="alert {% if message.tags == 'error' %}alert-error{% elif message.tags == 'success' %}alert-success{% else %}alert-warning{% endif %}">{{ message }}</div>
        {% endfor %}
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="forgot-email">Email Address</label>
                {{ form.email }}
            </div>
            <button type="submit" class="btn btn-primary">Send Reset Code</button>
        </form>
        <div class="auth-footer">
            <p><a href="{% url 'accounts:login' %}">Back to sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
