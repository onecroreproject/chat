{% extends 'base.html' %}
{% load static %}
{% block title %}Create Team - TeamSync{% endblock %}
{% block body %}
<div class="app-layout">
    {% include 'partials/sidebar.html' with active_tab='teams' %}
    <div class="main-content">
        <div class="content-header">
            <div class="content-header-left"><h3>Create Team</h3></div>
        </div>
        <div class="profile-container">
            <div class="profile-section">
                <h3>New Team</h3>
                <form method="POST">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Team Name</label>
                        <input type="text" name="name" class="form-input" placeholder="e.g., Engineering" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" name="description" class="form-input" placeholder="What's this team about?">
                    </div>
                    <div style="display:flex;gap:12px;justify-content:flex-end">
                        <a href="{% url 'teams:teams_home' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary" style="width:auto">Create Team</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
