{% load static %}
<!-- Left Rail Navigation -->
<div class="left-rail">
    <a href="{% url 'chat:activity' %}" class="rail-item {% if active_tab == 'activity' %}active{% endif %}" title="Activity" id="nav-activity">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span>Activity</span>
    </a>
    <a href="{% url 'chat:home' %}" class="rail-item {% if active_tab == 'chat' %}active{% endif %}" title="Chat" id="nav-chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span>Chat</span>
    </a>
    <a href="{% url 'teams:teams_home' %}" class="rail-item {% if active_tab == 'teams' %}active{% endif %}" title="Teams" id="nav-teams">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Teams</span>
    </a>
    <a href="{% url 'chat:calendar' %}" class="rail-item {% if active_tab == 'calendar' %}active{% endif %}" title="Calendar" id="nav-calendar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Calendar</span>
    </a>
    <div class="rail-spacer"></div>
    <a href="{% url 'accounts:profile' %}" class="rail-item {% if active_tab == 'profile' %}active{% endif %}" title="Profile" id="nav-profile">
        <img src="{{ request.user.get_profile_image_url }}" class="avatar avatar-sm" alt="Me">
    </a>
    <a href="{% url 'accounts:logout' %}" class="rail-item" title="Sign Out" id="nav-logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Exit</span>
    </a>
</div>
